<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 280" width="1400" height="280">

  <!-- BASE -->
  <rect width="1400" height="280" fill="#000000"/>

  <!-- GRID + DOT PATTERN -->
  <defs>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    </pattern>
    <pattern id="dotGrid" width="25" height="25" patternUnits="userSpaceOnUse">
      <circle cx="12.5" cy="12.5" r="0.5" fill="#222222"/>
    </pattern>
  </defs>
  <rect width="1400" height="280" fill="url(#grid)"/>
  <rect width="1400" height="280" fill="url(#dotGrid)"/>

  <!-- TITLE + HEADER -->
  <text x="700" y="30" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="13" font-weight="700" letter-spacing="6">OPERATIONAL PULSE</text>

  <!-- LIVE INDICATOR (left) -->
  <circle cx="40" cy="26" r="4" fill="#ffffff">
    <animate attributeName="opacity" values="1;0.3;1" dur="1.2s" repeatCount="indefinite"/>
  </circle>
  <text x="55" y="30" fill="#ffffff" font-family="monospace" font-size="10" font-weight="700" letter-spacing="3" opacity="0.7">LIVE</text>

  <!-- STATUS (right) -->
  <text x="1360" y="30" fill="#ffffff" font-family="monospace" font-size="10" font-weight="700" letter-spacing="3" opacity="0.7" text-anchor="end">SYS // OK</text>

  <!-- BASELINE -->
  <line x1="0" y1="150" x2="1400" y2="150" stroke="#222222" stroke-width="0.5"/>

  <!-- EKG WAVEFORM PATH (for animateMotion reference) -->
  <path id="wave"
        d="M 0 150
           L 150 150 L 165 150 L 175 120 L 185 180 L 195 150
           L 300 150 L 315 80 L 325 220 L 335 150
           L 450 150 L 465 135 L 480 150
           L 580 150 L 595 100 L 610 200 L 625 150
           L 720 150
           L 830 150 L 845 115 L 860 185 L 875 150
           L 990 150 L 1005 70 L 1020 230 L 1035 150
           L 1150 150 L 1165 140 L 1180 150
           L 1280 150 L 1295 90 L 1310 210 L 1325 150
           L 1400 150"
        stroke="#ffffff" stroke-width="1" fill="none" opacity="0.15"/>

  <!-- ACTIVE SCANNING TRACE -->
  <path d="M 0 150
           L 150 150 L 165 150 L 175 120 L 185 180 L 195 150
           L 300 150 L 315 80 L 325 220 L 335 150
           L 450 150 L 465 135 L 480 150
           L 580 150 L 595 100 L 610 200 L 625 150
           L 720 150
           L 830 150 L 845 115 L 860 185 L 875 150
           L 990 150 L 1005 70 L 1020 230 L 1035 150
           L 1150 150 L 1165 140 L 1180 150
           L 1280 150 L 1295 90 L 1310 210 L 1325 150
           L 1400 150"
        stroke="#ffffff" stroke-width="2" fill="none"
        stroke-dasharray="260 1600" stroke-dashoffset="0">
    <animate attributeName="stroke-dashoffset" from="1860" to="-260" dur="7s" repeatCount="indefinite"/>
  </path>

  <!-- LEADING DOTS (trailing effect) -->
  <circle r="5" fill="#ffffff">
    <animateMotion dur="7s" repeatCount="indefinite">
      <mpath href="#wave"/>
    </animateMotion>
  </circle>
  <circle r="3" fill="#ffffff" opacity="0.6">
    <animateMotion dur="7s" begin="0.12s" repeatCount="indefinite">
      <mpath href="#wave"/>
    </animateMotion>
  </circle>
  <circle r="2" fill="#ffffff" opacity="0.3">
    <animateMotion dur="7s" begin="0.24s" repeatCount="indefinite">
      <mpath href="#wave"/>
    </animateMotion>
  </circle>

  <!-- CENTRAL PULSAR -->
  <g transform="translate(700, 150)">
    <circle r="15" fill="none" stroke="#ffffff" stroke-width="1.5">
      <animate attributeName="r" values="15;75" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle r="15" fill="none" stroke="#ffffff" stroke-width="1.5">
      <animate attributeName="r" values="15;75" dur="3s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0" dur="3s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <circle r="15" fill="none" stroke="#ffffff" stroke-width="1.5">
      <animate attributeName="r" values="15;75" dur="3s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;0" dur="3s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <circle r="8" fill="#ffffff">
      <animate attributeName="r" values="6;10;6" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle r="3" fill="#000000">
      <animate attributeName="r" values="3;1;3" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- LEFT METRICS BARS -->
  <g transform="translate(60, 215)">
    <text x="0" y="0" fill="#ffffff" font-family="monospace" font-size="9" letter-spacing="2" opacity="0.5">ALT.STREAMS</text>
    <rect x="0" y="10" width="100" height="2" fill="#222222"/>
    <rect x="0" y="10" height="2" fill="#ffffff">
      <animate attributeName="width" values="0;100;25;70;0" dur="4s" repeatCount="indefinite"/>
    </rect>
    <rect x="0" y="18" width="100" height="2" fill="#222222"/>
    <rect x="0" y="18" height="2" fill="#ffffff">
      <animate attributeName="width" values="40;95;30;80;40" dur="3.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="0" y="26" width="100" height="2" fill="#222222"/>
    <rect x="0" y="26" height="2" fill="#ffffff">
      <animate attributeName="width" values="20;60;90;40;20" dur="4.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="0" y="34" width="100" height="2" fill="#222222"/>
    <rect x="0" y="34" height="2" fill="#ffffff">
      <animate attributeName="width" values="80;30;70;50;80" dur="3.2s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- RIGHT METRICS BARS -->
  <g transform="translate(1240, 215)">
    <text x="100" y="0" text-anchor="end" fill="#ffffff" font-family="monospace" font-size="9" letter-spacing="2" opacity="0.5">SIG.AMPL</text>
    <rect x="0" y="10" width="100" height="2" fill="#222222"/>
    <rect x="0" y="10" height="2" fill="#ffffff">
      <animate attributeName="width" values="80;30;70;40;80" dur="3.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="0" y="18" width="100" height="2" fill="#222222"/>
    <rect x="0" y="18" height="2" fill="#ffffff">
      <animate attributeName="width" values="50;90;20;60;50" dur="4.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="0" y="26" width="100" height="2" fill="#222222"/>
    <rect x="0" y="26" height="2" fill="#ffffff">
      <animate attributeName="width" values="30;70;50;90;30" dur="3.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="0" y="34" width="100" height="2" fill="#222222"/>
    <rect x="0" y="34" height="2" fill="#ffffff">
      <animate attributeName="width" values="60;20;80;40;60" dur="3.9s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- BOTTOM STATUS TEXT -->
  <text x="700" y="262" text-anchor="middle" fill="#ffffff" font-family="monospace" font-size="9" letter-spacing="4" opacity="0.4">AUTONOMOUS  //  ROUTING  //  SCANNING</text>

  <!-- CORNER BRACKETS (futuristic HUD feel) -->
  <path d="M 10 10 L 10 50 M 10 10 L 50 10" stroke="#ffffff" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M 1390 10 L 1390 50 M 1390 10 L 1350 10" stroke="#ffffff" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M 10 270 L 10 230 M 10 270 L 50 270" stroke="#ffffff" stroke-width="1" fill="none" opacity="0.3"/>
  <path d="M 1390 270 L 1390 230 M 1390 270 L 1350 270" stroke="#ffffff" stroke-width="1" fill="none" opacity="0.3"/>

</svg>
